name: Main Workflow

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js for use with actions
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Test
        run: npm test
